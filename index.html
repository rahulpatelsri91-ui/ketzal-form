<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ketzal Financial Services - Home Loan Eligibility</title>

<style>
body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:430px;
padding:25px;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
max-height:95vh;
overflow:auto;
}

h2{text-align:center;margin-bottom:10px;}

.step{display:none;}
.step.active{display:block;}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

label{
font-size:13px;
font-weight:bold;
}

.required{color:red;}

.button-group{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.next{background:#2575fc;color:white;}
.back{background:#ddd;}
</style>
</head>

<body>

<div class="container">

<h2>🏠 Home Loan Quick Eligibility</h2>

<!-- STEP 1 -->
<div class="step active" id="s1">

<label>Loan Type <span class="required">*</span></label>
<select id="loanType">
<option value="">Select</option>
<option>Fresh Home Loan</option>
<option>Balance Transfer</option>
<option>BT + Top Up</option>
</select>

<label>Full Name <span class="required">*</span></label>
<input id="name">

<label>Mobile <span class="required">*</span></label>
<input id="mobile">

<label>Age <span class="required">*</span></label>
<input id="age" type="number">

<div class="button-group">
<button class="next" onclick="nextStep(1)">Next</button>
</div>

</div>

<!-- STEP 2 -->
<div class="step" id="s2">

<label>Employment Type <span class="required">*</span></label>
<select id="employment">
<option value="">Select</option>
<option>Salaried</option>
<option>Self Employed</option>
</select>

<label>Monthly Income (₹) <span class="required">*</span></label>
<input id="income" type="number">

<label>Existing EMI (₹) <span class="required">*</span></label>
<input id="emi" type="number">

<label>Approx CIBIL <span class="required">*</span></label>
<select id="cibil">
<option value="">Select</option>
<option>750+</option>
<option>700–749</option>
<option>650–699</option>
<option>Below 650</option>
</select>

<div class="button-group">
<button class="back" onclick="prevStep(2)">Back</button>
<button class="next" onclick="nextStep(2)">Next</button>
</div>

</div>

<!-- STEP 3 -->
<div class="step" id="s3">

<label>Loan Amount Required (₹) <span class="required">*</span></label>
<input id="loanAmount" type="number">

<hr>

<h4>Co-Applicant Details (Mandatory)</h4>

<label>Co Applicant Name <span class="required">*</span></label>
<input id="coName">

<label>Co Applicant Age <span class="required">*</span></label>
<input id="coAge" type="number">

<label>Co Applicant Employment <span class="required">*</span></label>
<select id="coEmployment">
<option value="">Select</option>
<option>Salaried</option>
<option>Self Employed</option>
</select>

<label>Co Applicant Income (₹) <span class="required">*</span></label>
<input id="coIncome" type="number">

<div class="button-group">
<button class="back" onclick="prevStep(3)">Back</button>
<button class="next" onclick="submitLead()">Submit</button>
</div>

</div>

<!-- THANK YOU -->
<div class="step" id="thankyou">
<h3 style="color:green;text-align:center;">✅ Thank You!</h3>
<p style="text-align:center;">Our team will contact you shortly.</p>
</div>

</div>

<script>

function nextStep(n){
if(n==1){
if(!loanType.value||!name.value||!mobile.value||!age.value){
alert("Please fill all mandatory fields.");
return;
}
}
if(n==2){
if(!employment.value||!income.value||!emi.value||!cibil.value){
alert("Please fill all mandatory fields.");
return;
}
}
document.getElementById("s"+n).classList.remove("active");
document.getElementById("s"+(n+1)).classList.add("active");
}

function prevStep(n){
document.getElementById("s"+n).classList.remove("active");
document.getElementById("s"+(n-1)).classList.add("active");
}

function submitLead(){

if(!loanAmount.value||!coName.value||!coAge.value||!coEmployment.value||!coIncome.value){
alert("Please fill all mandatory fields.");
return;
}

fetch("PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE",{
method:"POST",
body:JSON.stringify({
loanType:loanType.value,
name:name.value,
mobile:mobile.value,
age:age.value,
employment:employment.value,
income:income.value,
emi:emi.value,
cibil:cibil.value,
loanAmount:loanAmount.value,
coName:coName.value,
coAge:coAge.value,
coEmployment:coEmployment.value,
coIncome:coIncome.value
})
})
.then(()=>{
document.getElementById("s3").classList.remove("active");
document.getElementById("thankyou").classList.add("active");
});

}

</script>

</body>
</html>
