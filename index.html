<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ketzal Financial Services - Home Loan Eligibility</title>

<style>
body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#5f2c82,#49a09d);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:440px;
padding:25px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
max-height:95vh;
overflow:auto;
}

h2{text-align:center;margin-bottom:15px;}

.step{display:none;}
.step.active{display:block;}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

label{
font-size:13px;
font-weight:bold;
}

.required{color:red;}

.button-group{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.next{background:#49a09d;color:white;}
.back{background:#ddd;}
</style>
</head>

<body>

<div class="container">

<h2>🏠 Home Loan Quick Eligibility</h2>

<!-- STEP 1 -->
<div class="step active" id="s1">

<label>Loan Type <span class="required">*</span></label>
<select id="loanType">
<option value="">Select</option>
<option>Fresh Home Loan</option>
<option>Balance Transfer</option>
<option>BT + Top Up</option>
</select>

<label>Full Name <span class="required">*</span></label>
<input id="name">

<label>Mobile <span class="required">*</span></label>
<input id="mobile">

<label>Date of Birth <span class="required">*</span></label>
<input id="dob" type="date">

<div class="button-group">
<button type="button" class="next" onclick="nextStep(1)">Next</button>
</div>

</div>

<!-- STEP 2 -->
<div class="step" id="s2">

<label>Employment Type <span class="required">*</span></label>
<select id="employment">
<option value="">Select</option>
<option>Salaried</option>
<option>Self Employed</option>
</select>

<label>Monthly Income (₹) <span class="required">*</span></label>
<input id="income" type="number">

<label>Existing EMI (₹) <span class="required">*</span></label>
<input id="emi" type="number">

<label>Approx CIBIL <span class="required">*</span></label>
<select id="cibil">
<option value="">Select</option>
<option>750+</option>
<option>700–749</option>
<option>650–699</option>
<option>Below 650</option>
</select>

<div class="button-group">
<button type="button" class="back" onclick="prevStep(2)">Back</button>
<button type="button" class="next" onclick="nextStep(2)">Next</button>
</div>

</div>

<!-- STEP 3 -->
<div class="step" id="s3">

<label>Loan Amount Required (₹) <span class="required">*</span></label>
<input id="loanAmount" type="number">

<hr>
<h4>Co-Applicant Details (Mandatory)</h4>

<label>Co Applicant Name <span class="required">*</span></label>
<input id="coName">

<label>Co Applicant Date of Birth <span class="required">*</span></label>
<input id="coDob" type="date">

<label>Co Applicant Employment <span class="required">*</span></label>
<select id="coEmployment" onchange="coEmploymentCheck()">
<option value="">Select</option>
<option>Salaried</option>
<option>Self Employed</option>
<option>House Wife</option>
</select>

<label>Co Applicant Income (₹) <span class="required">*</span></label>
<input id="coIncome" type="number">

<div class="button-group">
<button type="button" class="back" onclick="prevStep(3)">Back</button>
<button type="button" class="next" onclick="submitLead()">Submit</button>
</div>

</div>

<!-- THANK YOU -->
<div class="step" id="thankyou">
<h3 style="color:green;text-align:center;">✅ Thank You!</h3>
<p style="text-align:center;">Our team will contact you shortly.</p>
</div>

</div>

<script>

function calculateAge(dob){
var diff = Date.now() - new Date(dob).getTime();
var ageDate = new Date(diff);
return Math.abs(ageDate.getUTCFullYear() - 1970);
}

function nextStep(n){

if(n==1){
var loanType = document.getElementById("loanType").value;
var name = document.getElementById("name").value;
var mobile = document.getElementById("mobile").value;
var dob = document.getElementById("dob").value;

if(loanType=="" || name=="" || mobile=="" || dob==""){
alert("Please fill all mandatory fields.");
return;
}
}

if(n==2){
var employment = document.getElementById("employment").value;
var income = document.getElementById("income").value;
var emi = document.getElementById("emi").value;
var cibil = document.getElementById("cibil").value;

if(employment=="" || income=="" || emi=="" || cibil==""){
alert("Please fill all mandatory fields.");
return;
}
}

document.getElementById("s"+n).classList.remove("active");
document.getElementById("s"+(n+1)).classList.add("active");
}

function prevStep(n){
document.getElementById("s"+n).classList.remove("active");
document.getElementById("s"+(n-1)).classList.add("active");
}

function coEmploymentCheck(){
var emp = document.getElementById("coEmployment").value;
if(emp=="House Wife"){
document.getElementById("coIncome").value=0;
document.getElementById("coIncome").disabled=true;
}else{
document.getElementById("coIncome").disabled=false;
}
}

function submitLead(){

var loanAmount = document.getElementById("loanAmount").value;
var coName = document.getElementById("coName").value;
var coDob = document.getElementById("coDob").value;
var coEmployment = document.getElementById("coEmployment").value;
var coIncome = document.getElementById("coIncome").value;

if(loanAmount=="" || coName=="" || coDob=="" || coEmployment=="" || coIncome==""){
alert("Please fill all mandatory fields.");
return;
}

var age = calculateAge(document.getElementById("dob").value);
var coAge = calculateAge(coDob);

fetch("PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE",{
method:"POST",
body:JSON.stringify({
loanType:loanType.value,
name:name.value,
mobile:mobile.value,
age:age,
employment:employment.value,
income:income.value,
emi:emi.value,
cibil:cibil.value,
loanAmount:loanAmount,
coName:coName,
coAge:coAge,
coEmployment:coEmployment,
coIncome:coIncome
})
})
.then(()=>{
document.getElementById("s3").classList.remove("active");
document.getElementById("thankyou").classList.add("active");
});

}

</script>

</body>
</html>
